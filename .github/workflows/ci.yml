name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - refactor/bridge-structure

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check committed Codex bindings
        run: npm run verify:codex-types

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
